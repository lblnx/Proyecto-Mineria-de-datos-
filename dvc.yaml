stages:
  limpieza:
    cmd: python src/data/limpieza.py
    deps:
    - data/raw/bird_migration_with_origin_destination.csv
    - src/data/limpieza.py
    outs:
    - data/interim/bird_migration_OD_clean.csv
  procesado:
    cmd: python src/features/procesado.py
    deps:
    - data/interim/bird_migration_OD_clean.csv
    - src/features/procesado.py
    outs:
    - data/processed/bird_migration_OD_scaled.csv
  seleccion:
    cmd: python src/features/seleccion.py
    deps:
    - data/processed/bird_migration_OD_scaled.csv
    - src/features/seleccion.py
    outs:
    - data/processed/bird_migration_OD_selected.csv

  kmeans:
    cmd: python src/models/K-MEANS.py
    deps:
    - data/processed/bird_migration_OD_selected.csv
    - src/models/K-MEANS.py
    outs:
    - reports/figures/kmeans_clusters.png
  random_forest:
    cmd: python src/models/RANDOM-FOREST.py
    deps:
    - data/processed/bird_migration_OD_selected.csv
    - src/models/RANDOM-FOREST.py
    outs:
    - reports/figures/rf_confusion_matrix.png
  knn:
    cmd: python src/models/KNN.py
    deps:
    - data/processed/bird_migration_OD_selected.csv
    - src/models/KNN.py
    outs:
    - reports/figures/knn_confusion_matrix.png
